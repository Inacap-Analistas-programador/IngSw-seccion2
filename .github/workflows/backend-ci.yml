name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'SystemScoutsApi/**'
      - 'requirements.txt'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'SystemScoutsApi/**'
      - 'requirements.txt'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check backend dependencies file
      id: backend-deps
      run: |
        if [ -f requirements.txt ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      if: steps.backend-deps.outputs.available == 'true'
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      if: steps.backend-deps.outputs.available == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8

    - name: Lint with flake8
      if: steps.backend-deps.outputs.available == 'true'
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 SystemScoutsApi --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 SystemScoutsApi --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,migrations
      continue-on-error: true

    - name: Setup environment file
      if: steps.backend-deps.outputs.available == 'true'
      run: |
        cd SystemScoutsApi
        # Create .env with SQLite configuration (empty DB settings force SQLite usage)
        cat > .env << 'EOF'
        DJANGO_SECRET_KEY=test-secret-key-for-ci
        DJANGO_DEBUG=True
        DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
        DATABASE=
        USER=
        PASSWORD_DB=
        HOST=
        PORT=3306
        DB_NAME=
        DB_USER=
        DB_PASSWORD=
        DB_HOST=
        EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
        SITE_URL=http://localhost:8000
        EOF

    - name: Run migrations
      if: steps.backend-deps.outputs.available == 'true'
      run: |
        cd SystemScoutsApi
        python manage.py migrate --noinput

    - name: Run tests
      if: steps.backend-deps.outputs.available == 'true'
      run: |
        cd SystemScoutsApi
        python manage.py test

    - name: Skip backend CI checks
      if: steps.backend-deps.outputs.available != 'true'
      run: echo "requirements.txt not found; backend CI checks skipped."
